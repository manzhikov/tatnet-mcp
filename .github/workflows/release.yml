name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
      - name: Pack release archive
        run: tar -czf tatnet-mcp.tar.gz dist/ package.json package-lock.json
      - uses: softprops/action-gh-release@v2
        with:
          files: tatnet-mcp.tar.gz
          generate_release_notes: true
